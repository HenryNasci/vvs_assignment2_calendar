# Activated via @ActiveProfiles("e2e"). Provides a throwaway in-memory H2 database for
# Selenium end-to-end tests, isolated from the development database (./data/meetingsdb)
# and from the embedded database @DataJpaTest uses for the repository integration tests.
#
# DB_CLOSE_DELAY=-1 keeps the in-memory database alive for the lifetime of the JVM, since
# the full application context (with its connection pool) is what's connecting to it.
spring.datasource.url=jdbc:h2:mem:e2edb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Fresh schema on every test class (DirtiesContext reloads the context between classes).
spring.jpa.hibernate.ddl-auto=create
spring.h2.console.enabled=false
spring.thymeleaf.cache=false